name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    name: Build (Java 21)

    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
    - uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: 21
        cache: maven
    - name: Display Java version
      run: java -version
    - name: Display Maven version
      run: mvn --version
    - name: Get version
      id: version
      run: echo "VERSION=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"
    - name: Build and test
      run: mvn --activate-profiles dist --no-transfer-progress -Dmaven.build.timestamp=${{ steps.version.outputs.VERSION }} package
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: bungeecord-dist
        path: |
          **/target/*.jar
          !**/target/*-sources.jar
          !**/target/*-javadoc.jar

  release:
    runs-on: ubuntu-24.04

    name: Create Release

    needs: build
    if: github.event_name == 'push'

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: bungeecord-dist
        path: artifacts
    - name: Create or update release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION="${{ needs.build.outputs.version }}"
        # Delete existing release if it exists
        gh release view "v${VERSION}" 2>/dev/null && gh release delete "v${VERSION}" --yes || true
        # Create new release
        gh release create "v${VERSION}" \
          --title "Build v${VERSION}" \
          --notes "Automated release for commit ${GITHUB_SHA}" \
          --target "${GITHUB_SHA}"
        # Upload all JARs as release assets
        gh release upload "v${VERSION}" $(find artifacts -name "*.jar" -type f) --clobber
